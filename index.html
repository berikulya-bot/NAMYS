<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLogic AI | Мониторинг воды</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-10">

    <!-- Header -->
    <header class="bg-white shadow-sm p-5 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-emerald-600 tracking-tight">EcoLogic<span class="text-slate-800">AI</span></h1>
            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 shadow-inner">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 mt-2">
        
        <!-- Status Card -->
        <div id="mainCard" class="bg-white rounded-3xl p-8 shadow-xl border border-slate-100 text-center transition-all duration-500">
            <h2 class="text-slate-400 font-semibold uppercase text-xs tracking-widest mb-4">Уровень риска в Астане</h2>
            <div id="scoreDisplay" class="my-2">
                <span class="text-7xl font-bold text-emerald-500">88%</span>
                <p class="text-slate-600 font-medium">Безопасная зона</p>
            </div>
            <div class="mt-6 flex justify-center gap-4">
                <button onclick="simulateScan()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-slate-800 transition shadow-lg">
                    Проверить сейчас
                </button>
            </div>
        </div>

        <!-- Dashboard Info -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400">Частиц пластика</p>
                <p class="text-xl font-bold">12 / л</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400">Вероятность</p>
                <p class="text-xl font-bold text-emerald-500">Низкая</p>
            </div>
        </div>

        <!-- Subscription Card -->
        <div class="bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-3xl p-6 text-white shadow-2xl relative overflow-hidden">
            <h3 class="font-bold text-lg mb-1 relative z-10">Eco-Щит: годовая подписка</h3>
            <p class="text-emerald-100 text-sm mb-4 relative z-10">Безлимитный мониторинг, уведомления 24/7 и доступ к глобальной базе данных.</p>
            <button class="bg-white text-emerald-700 px-6 py-2 rounded-xl font-bold text-sm shadow-md">
                Подключить за 5000 ₸
            </button>
            <i class="fas fa-shield-halved absolute -right-4 -bottom-4 text-9xl text-emerald-800 opacity-20"></i>
        </div>

    </main>

    <script>
        function simulateScan() {
            const card = document.getElementById('mainCard');
            const display = document.getElementById('scoreDisplay');
            
            // Анимация
            card.style.opacity = '0.5';
            display.innerHTML = '<div class="py-6"><i class="fas fa-spinner fa-spin text-4xl text-emerald-500"></i><p class="mt-2 text-sm text-slate-400">Анализ нейросетью...</p></div>';
            
            setTimeout(() => {
                card.style.opacity = '1';
                display.innerHTML = '<span class="text-7xl font-bold text-amber-500">42%</span><p class="text-slate-600 font-medium">Внимание: зона риска</p>';
                card.classList.add('border-amber-200');
            }, 2000);
        }
    </script>
</body>
</html>
